kind = "web"
previewPath = "/"
title = "Sarah Deborah Stephenson"
version = "1.0.0"
id = "artifacts/sarah-stephenson"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19548

[services.development]
run = "pnpm --filter @workspace/sarah-stephenson run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sarah-stephenson", "run", "build" ]
serve = "static"
publicDir = "artifacts/sarah-stephenson/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19548"
BASE_PATH = "/"
